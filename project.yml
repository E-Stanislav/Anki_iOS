name: AnkiFlow
options:
  bundleIdPrefix: com.ankiflow
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "DJMBTK698A"

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    version: 5.6.0
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift.git
    version: 0.14.1
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    version: 0.9.18

targets:
  AnkiFlow:
    type: application
    platform: iOS
    sources:
      - path: AnkiFlow
    settings:
      base:
        INFOPLIST_FILE: AnkiFlow/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ankiflow.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: SnapKit
      - package: SQLite
      - package: ZIPFoundation
